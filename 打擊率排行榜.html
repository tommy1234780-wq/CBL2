<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>打擊排行榜</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --text-color: #333;
            --header-bg: #ffffff;
            --nav-bg: #ffffff;
            --link-color: #1565c0;
            --link-border: #1565c0;
            --link-hover-bg: #1565c0;
            --link-hover-text: #ffffff;
            --border-color: #e0e0e0;
            --title-color: #0d47a1;
            --card-bg: #ffffff;
            --section-title-border: #e0e0e0;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121212;
                --text-color: #e0e0e0;
                --header-bg: #1e1e1e;
                --nav-bg: #1e1e1e;
                --link-color: #4e9af1;
                --link-border: #4e9af1;
                --link-hover-bg: #4e9af1;
                --link-hover-text: #ffffff;
                --border-color: #333333;
                --title-color: #4e9af1;
                --card-bg: #1e1e1e;
                --section-title-border: #333333;
            }
            /* Specific for sub-nav in some pages */
            .sub-nav a { background-color: #2c2c2c !important; color: #4e9af1 !important; border-color: #444 !important; }
            .sub-nav a.active { background-color: #4e9af1 !important; color: #ffffff !important; border-color: #4e9af1 !important; }
            /* Specific for table headers/rows in ranking pages */
            th { background-color: #242526 !important; color: #e0e0e0 !important; }
            td { border-bottom: 1px solid #333 !important; color: #e0e0e0 !important; }
            table { background-color: #1e1e1e !important; }
        }

        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
        }
        h1 {
            color: var(--title-color);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background-color: var(--card-bg);
        }
        th, td {
            border: 1px solid var(--border-color);
            text-align: left;
            padding: 8px;
            color: var(--text-color);
        }
        th {
            background-color: var(--header-bg);
        }

        @media screen and (max-width: 600px) {
            .table-container {
                overflow-x: auto;
            }
            body {
                font-size: 0.9em;
            }
            th, td {
                padding: 6px;
            }
        }
    </style>
</head>
<body>

    <h1>打擊排行榜 <span style="font-size: 0.5em;">(當屆季賽總場數*1.9=入選打席數，如果成績一樣依照打席數多者排名較前)</span></h1>

    <div class="table-container">
        <table>
        <thead>
            <tr>
                <th>排名</th>
                <th>球員</th>
                <th>隊伍</th>
                <th>打擊率</th>
            </tr>
        </thead>
        <tbody id="leaderboard-tbody">
            <!-- Data will be loaded dynamically -->
        </tbody>
    </table>
    </div>

    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT_X5jYPR24dk5oqUSr1py8glTu-jHZJwuzhyJN7RrjMkgkXjwv0hVgmn7KlieQy_-CZEn6UQofqTbz/pub?gid=546432089&single=true&output=csv";
        const tbody = document.getElementById('leaderboard-tbody');

        async function fetchAndRenderLeaderboard() {
            try {
                const res = await fetch(CSV_URL);
                if (!res.ok) throw new Error('Failed to fetch CSV: HTTP ' + res.status);
                const text = await res.text();
                
                const lines = text.trim().split(/\n/);
                const headers = lines[0].split(',').map(h => h.trim());
                let data = lines.slice(1).map(line => {
                    const values = [];
                    let current_value = "";
                    let in_quotes = false;
                    for (let i = 0; i < line.length; i++) {
                        const char = line[i];
                        const next_char = line[i+1];
                        if (char === '"' && in_quotes && next_char === '"' ) {
                            current_value += '"' ;
                            i++;
                        } else if (char === '"' ) {
                            in_quotes = !in_quotes;
                        } else if (char === ',' && !in_quotes) {
                            values.push(current_value.trim());
                            current_value = "";
                        } else {
                            current_value += char;
                        }
                    }
                    values.push(current_value.trim());

                    const row_data = {};
                    headers.forEach((h, i) => row_data[h] = values[i] || "");
                    return row_data;
                });

                const seasonKey = headers.find(h => h.includes('屆數') || h.includes('屆別') || h.includes('賽季')) || "屆數";
                data = data.filter(row => row[seasonKey] === '第二屆');

                const player_key = headers.find(h => h.includes('姓名')) || '背號/姓名';
                const team_key = headers.find(h => h.includes('隊伍')) || '隊伍';
                const batting_avg_key = headers.find(h => h.includes('打擊率')) || '打擊率';
                const pa_key = headers.find(h => h.includes('打席')) || '打席';

                const filtered_data = [];
                for (const entry of data) {
                    let batting_avg;
                    try {
                        batting_avg = parseFloat(entry[batting_avg_key]);
                        if (isNaN(batting_avg)) batting_avg = 0.0;
                    } catch (e) {
                        batting_avg = 0.0;
                    }
                    
                    let pa;
                    try {
                        pa = parseInt(entry[pa_key], 10);
                        if (isNaN(pa)) pa = 0;
                    } catch (e) {
                        pa = 0;
                    }

                    if (pa >= 30) {
                        const new_entry = {...entry};
                        new_entry[batting_avg_key] = batting_avg;
                        new_entry[pa_key] = pa;
                        filtered_data.push(new_entry);
                    }
                }
                
                const sorted_data = filtered_data.sort((a, b) => {
                    if (b[batting_avg_key] !== a[batting_avg_key]) {
                        return b[batting_avg_key] - a[batting_avg_key];
                    }
                    return b[pa_key] - a[pa_key];
                });

                let html_rows = "";
                let rank = 0;
                let last_score = -1;
                sorted_data.slice(0, 10).forEach((player, index) => {
                    if (player[batting_avg_key] !== last_score) {
                        rank = index + 1;
                    }
                    let rank_display = rank;
                    if (rank === 1) {
                        rank_display = '🏆';
                    }

                    const is_first = rank === 1;
                    const style = is_first ? ' style="color: red;"' : '';

                    html_rows += `
                        <tr>
                            <td>${rank_display}</td>
                            <td><span${style}>${player[player_key]}</span></td>
                            <td><span${style}>${player[team_key]}</span></td>
                            <td><span${style}>${player[batting_avg_key].toFixed(3)}</span></td>
                        </tr>
                    `;
                    last_score = player[batting_avg_key];
                });
                tbody.innerHTML = html_rows;

            } catch (error) {
                console.error("Error fetching or parsing CSV:", error);
                tbody.innerHTML = `<tr><td colspan="4">載入資料失敗: ${error.message}</td></tr>`;
            }
        }

        fetchAndRenderLeaderboard();
        setInterval(fetchAndRenderLeaderboard, 300000); // Refresh every 5 minutes
    </script>

</body>
</html>
